name: Build and Package
 
on:
  push:
    branches: [ main ]
  release:
    types: [ created ]
 
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            preset: windows-release
            artifact: "*.exe"
          - os: ubuntu-latest
            preset: linux-release
            artifact: "*.deb"
          - os: macos-latest
            preset: mac-release
            artifact: "*.dmg"
 
    runs-on: ${{ matrix.os }}
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
 
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gcc g++ make rpm
 
      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v4
 
      - name: Install vcpkg and dependencies
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "${{ github.workspace }}/vcpkg"
          runVcpkgInstall: true
 
      - name: Export VCPKG_ROOT
        shell: bash
        run: echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV
 
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
 
      - name: Build
        run: cmake --build build/out --config Release
 
      - name: Install
        run: cmake --install build/out --prefix build/out/install
 
      - name: Package
        run: cd build/out && cpack -C Release
 
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: build/out/${{ matrix.artifact }}
