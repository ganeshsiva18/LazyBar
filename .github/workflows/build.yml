name: Build and Package
 
on:
  push:
    branches: [ main ]
  release:
    types: [ created ]
 
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            preset: windows-release
            artifact: "*.exe"
          - os: ubuntu-latest
            preset: linux-release
            artifact: "*.deb"
          - os: macos-latest
            preset: mac-release
            artifact: "*.dmg"
 
    runs-on: ${{ matrix.os }}
 
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
 
      - name: Enable vcpkg binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL);
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN);
 
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build gcc g++ make rpm \
            autoconf autoconf-archive automake libtool libltdl-dev \
            libgtk-3-dev pkg-config
 
      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Setup MSVC developer environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
 
      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Install vcpkg and dependencies
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "${{ github.workspace }}/vcpkg"
          runVcpkgInstall: true
 
      - name: Show vcpkg error log
        if: failure()
        shell: bash
        run: |
          cat "$GITHUB_WORKSPACE/build/out/vcpkg-manifest-install.log" 2>/dev/null || true
          find "$GITHUB_WORKSPACE/vcpkg/buildtrees" -name "*-err.log" -exec cat {} + 2>/dev/null || true
 
      - name: Export VCPKG_ROOT
        shell: bash
        run: echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV
 
      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: build/out
          key: build-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt', 'src/**') }}
          restore-keys: build-${{ matrix.os }}-
 
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
 
      - name: Build
        run: cmake --build build/out --config Release
 
      - name: Install
        run: cmake --install build/out --prefix build/out/install
 
      - name: Package
        run: cd build/out && cpack -C Release
 
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: build/out/${{ matrix.artifact }}
